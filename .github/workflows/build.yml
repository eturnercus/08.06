name: Build Silenium

on:
  push:
    branches: [main, "cursor/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish GitHub Release (e.g. v1.0.1 — must match src-tauri/tauri.conf.json)"
        required: false
        type: string

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev \
            libfuse2 fuse3 pkg-config cmake
      - run: npm ci
      - run: npm run lint
      - run: npm run tauri build -- --bundles deb
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: silenium-linux-x64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/silenium
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: npm ci
      - run: npm run lint
      - run: npm run tauri build -- --bundles msi
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: silenium-windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/silenium.exe
          if-no-files-found: error

  release:
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Release tag is empty"
            exit 1
          fi
          case "$TAG" in v*) ;; *)
            echo "::error::Tag must start with v (got $TAG)"
            exit 1
            ;;
          esac
          VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG" != "v$VER" ]; then
            echo "::error::Tag $TAG must match tauri.conf.json version v$VER"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Silenium $TAG" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.msi' -o -name 'silenium.exe' \) -exec cp -v {} release/ \;
          ls -la release/
          if [ -z "$(ls -A release)" ]; then
            echo "::error::No release binaries found in artifacts"
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: release/*
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' }}
          make_latest: true
